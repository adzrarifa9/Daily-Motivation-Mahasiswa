<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Motivation App</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">MotivationApp ✨</div>

    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#feature">Feature</a></li>
    </ul>
  </nav>



  <!-- LANDING PAGE -->
  <section class="hero" id="home">

   <div class="hero-text">

  <h3 class="greeting">
    👋 Hello, Welcome!
  </h3>

  <h1>Daily Motivation App</h1>

  <p>
    Get inspirational quotes every day to boost your spirit and productivity.
  </p>

  <button id="startBtn">
    Explore Now
  </button>

</div>

  </section>

  <!-- MAIN FEATURE -->
  <section class="main-feature" id="feature">

    <div class="card">

      <h2>Random Quote Generator</h2>

      <p id="quote">
        Click the button to get motivation ✨
      </p>

      <h4 id="author"></h4>

      <div class="button-group">

        <button id="quoteBtn">
          Generate Quote
        </button>

        <button id="copyBtn">
          Copy Quote
        </button>

        <button id="darkBtn">
          Dark Mode
        </button>

      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>
      © 2026 Daily Motivation App | Frontend Final Project
    </p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
